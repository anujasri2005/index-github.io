<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Happy Birthday</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            text-align: center;
            background: linear-gradient(to right, #ff9a9e, #fad0c4);
            color: white;
        }

        .container {
            margin-top: 100px;
        }

        h1 {
            font-size: 50px;
            animation: glow 1s infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 10px #fff; }
            to { text-shadow: 0 0 20px yellow, 0 0 30px orange; }
        }

        p {
            font-size: 22px;
        }

        button {
            padding: 12px 25px;
            font-size: 18px;
            background-color: #ff4081;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 20px;
        }

        button:hover {
            background-color: #e91e63;
        }

        .hidden-message {
            display: none;
            font-size: 24px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🎉 Happy Birthday! 🎂</h1>
        <p>Wishing you a day filled with happiness and joy!</p>

        <button onclick="showMessage()">Click for Surprise 🎁</button>

        <div class="hidden-message" id="surprise">
            💖 May all your dreams come true! 💖
        </div>
    </div>

    <script>
        function showMessage() {
            document.getElementById("surprise").style.display = "block";
        }
    </script>

</body>
</html>
